<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDP 開盤五分鐘當沖劇本產生器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B0D10;
    --panel:#15191E;
    --panel-2:#1C2127;
    --hairline:#2A2F36;
    --paper:#ECE8E0;
    --muted:#878D96;
    --up:#FF5C5C;      /* 台股慣例：紅漲 */
    --down:#2BB673;    /* 台股慣例：綠跌 */
    --amber:#E3A23D;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--paper);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    -webkit-tap-highlight-color: transparent;}
  body{padding-bottom:48px;}

  h1,h2,h3{font-family:'Space Grotesk',sans-serif;margin:0;}
  .mono{font-family:'IBM Plex Mono',monospace;}

  header.top{
    padding:28px 18px 22px;
    border-bottom:1px solid var(--hairline);
    background:linear-gradient(180deg, #11141A 0%, var(--ink) 100%);
  }
  header.top .eyebrow{
    color:var(--amber);font-size:12px;letter-spacing:.14em;text-transform:uppercase;
    font-family:'IBM Plex Mono',monospace;margin-bottom:8px;
  }
  header.top h1{font-size:22px;line-height:1.3;font-weight:700;}
  header.top .sub{color:var(--muted);font-size:13.5px;margin-top:8px;line-height:1.55;}
  header.top .clock{
    margin-top:14px;font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--paper);
    display:flex;gap:14px;flex-wrap:wrap;
  }
  header.top .clock span.dot{color:var(--amber);}

  main{padding:18px 16px 12px;max-width:640px;margin:0 auto;}

  section.card{
    background:var(--panel);
    border:1px solid var(--hairline);
    border-radius:var(--radius);
    padding:18px 16px;
    margin-bottom:18px;
  }
  section.card h2{
    font-size:15px;font-weight:700;color:var(--paper);
    display:flex;align-items:center;gap:8px;margin-bottom:4px;
  }
  section.card h2 .tag{
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--amber);
    border:1px solid var(--amber);border-radius:999px;padding:2px 8px;
  }
  section.card p.hint{color:var(--muted);font-size:12.5px;line-height:1.6;margin:6px 0 14px;}

  label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:5px;margin-top:12px;}
  label:first-of-type{margin-top:0;}
  input[type=date], input[type=number], input[type=text], textarea, select{
    width:100%;background:var(--panel-2);border:1px solid var(--hairline);
    color:var(--paper);border-radius:8px;padding:10px 11px;font-size:14.5px;
    font-family:'IBM Plex Mono',monospace;
  }
  textarea{font-family:'IBM Plex Mono',monospace;font-size:12.5px;min-height:110px;resize:vertical;}
  input:focus, textarea:focus, select:focus{outline:2px solid var(--amber);outline-offset:1px;}

  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}

  button{
    font-family:'Inter',sans-serif;font-weight:600;font-size:14px;
    border-radius:8px;padding:11px 16px;border:1px solid transparent;
    cursor:pointer;width:100%;margin-top:14px;
  }
  button.primary{background:var(--amber);color:#1A1304;}
  button.primary:active{opacity:.85;}
  button.secondary{background:transparent;color:var(--paper);border:1px solid var(--hairline);}
  button.secondary:active{background:var(--panel-2);}
  button.ghost{background:transparent;color:var(--muted);border:1px dashed var(--hairline);font-size:13px;}
  button:disabled{opacity:.45;cursor:not-allowed;}

  .status{font-size:12.5px;color:var(--muted);margin-top:10px;font-family:'IBM Plex Mono',monospace;}
  .status.err{color:var(--up);}
  .status.ok{color:var(--down);}

  /* 價格梯 ladder */
  .ladder{margin-top:16px;border-radius:8px;overflow:hidden;border:1px solid var(--hairline);}
  .ladder .lv{
    display:flex;justify-content:space-between;align-items:center;
    padding:10px 12px;font-family:'IBM Plex Mono',monospace;font-size:13.5px;
    border-bottom:1px solid var(--hairline);background:var(--panel-2);
  }
  .ladder .lv:last-child{border-bottom:none;}
  .ladder .lv .name{color:var(--muted);font-size:11.5px;letter-spacing:.06em;}
  .ladder .lv .val{font-weight:600;font-size:15px;}
  .ladder .lv.ah .val, .ladder .lv.nh .val{color:var(--up);}
  .ladder .lv.cdp{background:#20180A;}
  .ladder .lv.cdp .val{color:var(--amber);font-size:16px;}
  .ladder .lv.nl .val, .ladder .lv.al .val{color:var(--down);}

  table{width:100%;border-collapse:collapse;margin-top:6px;font-size:12.5px;}
  table thead th{
    text-align:right;color:var(--muted);font-weight:500;font-size:11px;
    padding:6px 6px;border-bottom:1px solid var(--hairline);
    font-family:'IBM Plex Mono',monospace;letter-spacing:.04em;white-space:nowrap;
  }
  table thead th:first-child, table thead th:nth-child(2){text-align:left;}
  table tbody td{
    text-align:right;padding:8px 6px;border-bottom:1px solid var(--hairline);
    font-family:'IBM Plex Mono',monospace;white-space:nowrap;
  }
  table tbody td:first-child{text-align:left;font-weight:600;}
  table tbody td:nth-child(2){text-align:left;color:var(--muted);font-family:'Inter',sans-serif;}
  table tbody tr:last-child td{border-bottom:none;}
  .pct.up{color:var(--up);}
  .pct.down{color:var(--down);}
  .scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch;}

  details{margin-top:4px;}
  details summary{cursor:pointer;color:var(--muted);font-size:12.5px;padding:4px 0;}
  details[open] summary{color:var(--paper);}

  .colmap{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
  .colmap label{margin-top:0;}

  footer{max-width:640px;margin:0 auto;padding:8px 16px 30px;color:var(--muted);font-size:11.5px;line-height:1.7;}
  footer .formula{
    font-family:'IBM Plex Mono',monospace;color:var(--amber);font-size:11.5px;
    margin-bottom:10px;line-height:1.9;
  }
  .empty{color:var(--muted);font-size:13px;padding:14px 0;text-align:center;}
</style>
</head>
<body>

<header class="top">
  <div class="eyebrow">TWSE Daytrade Scenario Builder</div>
  <h1>CDP 開盤五分鐘<br>當沖劇本產生器</h1>
  <div class="sub">輸入日期與門檻，自動算出隔一個交易日的 CDP 支撐壓力價位。資料每個交易日收盤後由排程自動更新，手機開網頁看結果就好。</div>
  <div class="clock"><span class="dot">●</span><span id="clockTime" class="mono">--:--:--</span><span id="clockDate" class="mono"></span></div>
</header>

<main>

  <!-- Step 1 -->
  <section class="card" id="settingsCard">
    <h2><span class="tag">STEP 1</span> 設定條件</h2>
    <p class="hint">用最近一個交易日的自動資料，篩出符合門檻的股票，算出它們「下一個交易日」要用的 CDP 價位。</p>

    <div class="row2">
      <div>
        <label for="gainThreshold">漲跌幅門檻 (%, 絕對值)</label>
        <input type="number" id="gainThreshold" value="3" step="0.5" min="0">
      </div>
      <div>
        <label for="volThreshold">成交量門檻 (張)</label>
        <input type="number" id="volThreshold" value="3000" step="500" min="0">
      </div>
    </div>

    <label for="foreignThreshold">外資買超門檻 (張)</label>
    <select id="foreignThreshold">
      <option value="0">不篩選</option>
      <option value="1000">1000 張以上</option>
      <option value="2000">2000 張以上</option>
      <option value="3000">3000 張以上</option>
      <option value="5000" selected>5000 張以上</option>
      <option value="8000">8000 張以上</option>
      <option value="10000">10000 張以上</option>
    </select>
    <p class="hint" style="margin:6px 0 0;">外資買賣超資料公布較晚（常常要到晚上才出來），如果這項抓不到，股
